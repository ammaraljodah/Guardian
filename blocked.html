<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Blocked</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        max-width: 520px;
        width: 100%;
        text-align: center;
      }
      .shield {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 8px;
      }
      .site {
        font-weight: 700;
        color: #fff;
        word-break: break-all;
      }
      .reason {
        margin: 14px 0 6px;
      }
      .parent {
        margin-top: 22px;
        text-align: left;
      }
      details summary {
        cursor: pointer;
        color: var(--muted);
        list-style: none;
        text-align: center;
      }
      details summary::-webkit-details-marker {
        display: none;
      }
      .unlock-form {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel card">
        <div class="shield">🛡️</div>
        <h1>This site is blocked</h1>
        <p class="reason muted" id="reason">
          Access to <span class="site" id="site">this site</span> is restricted
          by your parental controls.
        </p>

        <div class="parent">
          <details>
            <summary>Parent override</summary>
            <form class="unlock-form" id="unlockForm">
              <input
                type="password"
                id="pin"
                placeholder="Enter parent PIN"
                inputmode="numeric"
                autocomplete="off"
              />
              <div class="row" style="gap: 8px">
                <button type="submit" style="flex: 1">
                  Allow this site (15 min)
                </button>
                <button type="button" id="openSettings" class="secondary">
                  Settings
                </button>
              </div>
              <div class="error" id="error"></div>
            </form>
          </details>
        </div>
      </div>
    </div>
    <script type="module" src="blocked.js"></script>
  </body>
</html>
